<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GestureLink Console</title>
  <style>
    :root {
      --bg: #060b14;
      --card: rgba(17, 25, 40, 0.75);
      --brand: #00ff95;
      --text: #f0f4f8;
      --muted: #8a99a8;
      --line: rgba(255, 255, 255, 0.1);
      --good: #00ff95;
      --warn: #ffcc00;
      --danger: #ff4444;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .shell {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.1);
    }

    .badge.ok {
      background: rgba(0, 255, 149, 0.15);
      color: var(--good);
      border: 1px solid var(--good);
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      opacity: 0.6;
      padding: 10px 16px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    .tab-btn.active {
      opacity: 1;
      color: var(--brand);
      border-bottom: 2px solid var(--brand);
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: #000;
      margin-bottom: 15px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #skeleton {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .device-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
    }

    .device-item.active {
      border-color: var(--brand);
      background: rgba(0, 255, 149, 0.05);
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font: inherit;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: var(--brand);
      color: #000;
      cursor: pointer;
      transition: 0.2s;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.4;
    }

    .btnrow {
      display: flex;
      gap: 8px;
    }

    .status {
      font-size: 0.9rem;
      margin-top: 15px;
      display: grid;
      gap: 6px;
    }

    .kv {
      color: var(--muted);
    }

    .ok {
      color: var(--good);
    }

    .small {
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="shell">
    <div class="hero">
      <h1>GestureLink</h1>
      <div class="badge" id="connBadge">Offline</div>
    </div>

    <nav class="tabs">
      <button class="tab-btn active" id="tabControl" onclick="showTab('control')">Control</button>
      <button class="tab-btn" id="tabDevices" onclick="showTab('devices')">Devices</button>
      <button class="tab-btn" id="tabSettings" onclick="showTab('settings')">Settings</button>
    </nav>

    <div id="controlTab" class="tab-pane active">
      <section class="card">
        <div class="btnrow" style="margin-bottom: 16px;">
          <button id="modeVision" onclick="setMode('vision')" style="flex:1">Vision</button>
          <button id="modeTrackpad" class="secondary" onclick="setMode('trackpad')" style="flex:1">Trackpad</button>
        </div>

        <div id="visionArea">
          <div class="video-wrap">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="skeleton"></canvas>
          </div>
        </div>

        <div id="trackpadArea" style="display:none">
          <div id="touchZone" style="width:100%; aspect-ratio:1/1.2; background:rgba(0,0,0,0.4); border-radius:16px; border:2px dashed var(--line); display:flex; align-items:center; justify-content:center; touch-action:none;">
            <span class="muted">Precision Trackpad</span>
          </div>
        </div>

        <div class="status">
          <div><span class="kv">Target:</span> <span id="activeDeviceName" class="ok">None</span></div>
          <div><span class="kv">Gesture:</span> <span id="gestureText">-</span></div>
          <div><span class="kv">Action:</span> <span id="actionText">-</span></div>
        </div>
      </section>
    </div>

    <div id="devicesTab" class="tab-pane">
      <article class="card">
        <h3>Connect to Current PC</h3>
        <p class="small" style="margin-bottom: 12px;">The PC serving this page.</p>
        <button onclick="addCurrentPC()" style="width: 100%;">Connect to This PC</button>

        <h3 style="margin-top: 24px;">Network Scan</h3>
        <div class="btnrow">
          <button onclick="scanNetwork()" id="scanBtn">Scan Wi-Fi</button>
          <button class="secondary" onclick="addManualDevice()">Add IP</button>
        </div>
        <div id="scanStatus" class="small" style="margin-top: 10px;"></div>

        <h3 style="margin-top: 24px;">Connections (Max 2)</h3>
        <div id="deviceList">
          <p class="small">No devices connected.</p>
        </div>
      </article>
    </div>

    <div id="settingsTab" class="tab-pane">
      <article class="card">
        <h3>PC Settings</h3>
        <div class="input-group">
          <label>1 Finger Shortcut</label>
          <select id="s1Select"></select>
        </div>
        <div class="input-group">
          <label>2 Fingers Shortcut</label>
          <select id="s2Select"></select>
        </div>
        <div class="input-group">
          <label>3 Fingers Shortcut</label>
          <select id="s3Select"></select>
        </div>
        <div class="input-group">
          <label>Cursor Sensitivity</label>
          <input type="range" id="sensRange" min="5" max="95" value="50">
        </div>
        <button id="saveBtn" style="width:100%">Save to Device</button>
      </article>
    </div>
  </main>

  <script>
    const video = document.getElementById("video");
    const skelCanvas = document.getElementById("skeleton");
    const skelCtx = skelCanvas.getContext("2d");
    const activeDeviceName = document.getElementById("activeDeviceName");
    const gestureText = document.getElementById("gestureText");
    const actionText = document.getElementById("actionText");
    const connBadge = document.getElementById("connBadge");

    let activePC = null;
    let devices = [];
    let sendingFrame = false;
    let stream = null;
    let controlMode = 'vision';
    let lastX = 0, lastY = 0;
    let isTouching = false;
    let touchStartTime = 0;
    let maxFingers = 0;

    function setMode(mode) {
      controlMode = mode;
      document.getElementById('visionArea').style.display = mode === 'vision' ? 'block' : 'none';
      document.getElementById('trackpadArea').style.display = mode === 'trackpad' ? 'block' : 'none';
      document.getElementById('modeVision').className = mode === 'vision' ? '' : 'secondary';
      document.getElementById('modeTrackpad').className = mode === 'trackpad' ? '' : 'secondary';
      if (mode === 'vision') startLoop();
    }

    const touchZone = document.getElementById('touchZone');
    touchZone.addEventListener('touchstart', (e) => {
      isTouching = true;
      touchStartTime = Date.now();
      maxFingers = Math.max(maxFingers, e.touches.length);
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    touchZone.addEventListener('touchmove', (e) => {
      if (!isTouching || !activePC || !activePC.ws || activePC.ws.readyState !== 1) return;
      maxFingers = Math.max(maxFingers, e.touches.length);
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      const dx = x - lastX;
      const dy = y - lastY;
      
      if (e.touches.length === 1) {
          activePC.ws.send(JSON.stringify({ type: 'touch', dx, dy }));
      } else if (e.touches.length === 2) {
          activePC.ws.send(JSON.stringify({ type: 'scroll', dy }));
      }
      
      lastX = x;
      lastY = y;
      e.preventDefault();
    }, { passive: false });

    touchZone.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) { // All fingers up
          if (Date.now() - touchStartTime < 200) {
              const button = maxFingers === 1 ? 'left' : 'right';
              if (activePC && activePC.ws) {
                activePC.ws.send(JSON.stringify({ type: 'click', button }));
              }
          }
          maxFingers = 0;
          isTouching = false;
      }
      e.preventDefault();
    }, { passive: false });

    function showTab(id) {
      document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById(id + "Tab").classList.add("active");
      document.getElementById("tab" + id.charAt(0).toUpperCase() + id.slice(1)).classList.add("active");
    }

    function addCurrentPC() {
      addDeviceToList(location.host, "Current PC (Auto)");
      const idx = devices.length - 1;
      connectToPC(idx);
    }

    async function scanNetwork() {
      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("scanStatus");
      btn.disabled = true;
      status.textContent = "Detecting LAN...";

      let base = "192.168.1";
      try {
        const info = await fetch("/lan-info").then(r => r.json());
        const lanIp = info.lan_url.split("//")[1].split(":")[0];
        base = lanIp.split(".").slice(0, 3).join(".");
        status.textContent = `Scanning ${base}.x...`;
      } catch (e) { console.warn("Subnet detect failed, using fallback."); }

      const promises = [];
      for (let i = 1; i < 255; i++) {
        const ip = `${base}.${i}`;
        promises.push(
          fetch(`http://${ip}:8000/api/ping`, { signal: AbortSignal.timeout(1200) })
            .then(r => r.json()).then(d => { if (d.ok) addDeviceToList(ip, d.hostname); })
            .catch(() => { })
        );
      }
      await Promise.allSettled(promises);
      btn.disabled = false;
      status.textContent = "Scan complete.";
    }

    function addDeviceToList(ip, hostname) {
      if (devices.some(d => d.ip === ip)) return;
      devices.push({ ip, hostname, ws: null, apps: [], shortcuts: {} });
      renderDevices();
    }

    function addManualDevice() {
      const ip = prompt("Enter PC IP (e.g. 192.168.1.5):");
      if (ip) addDeviceToList(ip, "Manual PC");
    }

    function renderDevices() {
      const list = document.getElementById("deviceList");
      if (devices.length === 0) { list.innerHTML = "<p class='small'>No devices.</p>"; return; }
      list.innerHTML = devices.map((d, i) => `
        <div class="device-item ${activePC === d ? 'active' : ''}">
          <div><strong>${d.hostname}</strong><br/><span class="small">${d.ip}</span></div>
          <div class="btnrow">
            ${d.ws ? `<button onclick="activatePC(${i})">${activePC === d ? 'Active' : 'Switch'}</button>` :
          `<button onclick="connectToPC(${i})">Connect</button>`}
            <button class="secondary" onclick="removeDevice(${i})">X</button>
          </div>
        </div>
      `).join("");
    }

    function removeDevice(i) {
      if (devices[i] === activePC) activePC = null;
      if (devices[i].ws) devices[i].ws.close();
      devices.splice(i, 1);
      renderDevices();
    }

    async function connectToPC(i) {
      if (devices.filter(d => d.ws).length >= 2) { alert("Max 2 active connections."); return; }
      const d = devices[i];

      // Smart WebSocket Protocol Handling
      const isHttps = location.protocol === "https:";
      const isHub = d.ip === window.location.host;
      let wsUrl = "";

      if (isHub) {
          // If connecting to the Hub itself, use the direct endpoint
          const proto = isHttps ? "wss:" : "ws:";
          wsUrl = `${proto}//${window.location.host}/ws`;
      } else if (isHttps) {
          // If on HTTPS (ngrok) connecting to a REMOTE PC, use the relay
          wsUrl = `wss://${window.location.host}/relay?target=${d.ip}`;
      } else {
          // If on HTTP, connect directly to the target PC
          let host = d.ip;
          if (!host.includes(":") && !host.includes("ngrok") && !host.includes(".dev")) {
            host = host + ":8000";
          }
          wsUrl = `ws://${host}/ws`;
      }

      console.log("Connecting to:", wsUrl);
      try {
        d.ws = new WebSocket(wsUrl);
        d.ws.binaryType = "arraybuffer";
        d.ws.onopen = () => { renderDevices(); activatePC(i); };
        d.ws.onclose = () => { d.ws = null; if (activePC === d) activePC = null; renderDevices(); };
        d.ws.onmessage = (msg) => {
          if (activePC !== d) return;
          const data = JSON.parse(msg.data);
          if (data.error) alert(data.error);
          if (data.status) actionText.textContent = data.status;
          if (data.gesture) gestureText.textContent = data.gesture;
          if (data.landmarks) drawSkeleton(data.landmarks);
        };
        d.ws.onerror = (e) => {
          console.error("WS Error:", e);
          alert("Connection Failed. If on HTTPS, you must use a secure (WSS) link.");
        };
      } catch (e) { alert("Failed to create connection: " + e.message); }
    }

    async function activatePC(i) {
      activePC = devices[i];
      activeDeviceName.textContent = activePC.hostname;
      connBadge.textContent = "Live";
      connBadge.className = "badge ok";
      renderDevices();
      await syncSettings();
      showTab("control");
    }

    async function syncSettings() {
      if (!activePC) return;
      try {
        let host = activePC.ip;
        if (!host.includes(":") && !host.includes("ngrok") && !host.includes(".dev")) {
          host = host + ":8000";
        }
        const base = location.protocol + "//" + host;
        const [appRes, shortRes, setRes] = await Promise.all([
          fetch(`${base}/api/apps`).then(r => r.json()),
          fetch(`${base}/api/shortcuts`).then(r => r.json()),
          fetch(`${base}/api/settings`).then(r => r.json())
        ]);

        const opts = [`<option value="">-- None --</option>`,
          ...appRes.apps.map(a => `<option value="${encodeURIComponent(a.target)}">${a.name}</option>`)].join("");

        ["s1Select", "s2Select", "s3Select"].forEach(id => document.getElementById(id).innerHTML = opts);

        const s = shortRes.shortcuts;
        document.getElementById("s1Select").value = encodeURIComponent(s.one_finger?.target || "");
        document.getElementById("s2Select").value = encodeURIComponent(s.two_fingers?.target || "");
        document.getElementById("s3Select").value = encodeURIComponent(s.three_fingers?.target || "");
        document.getElementById("sensRange").value = setRes.sensitivity || 50;
      } catch (e) { console.error("Sync error:", e); }
    }

    async function initCamera() {
      // Auto-add current server if not local
      const curHost = window.location.host;
      if (curHost && !devices.some(d => d.ip === curHost)) {
          addDeviceToList(curHost, "Current Server (Cloud)");
          // Auto-connect to the cloud server immediately
          setTimeout(() => connectToPC(0), 500);
      }

      if (stream) return;
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: 640, height: 480 } 
      });
      video.srcObject = stream;
      video.play();
    }

    async function startLoop() {
      await initCamera();
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      setInterval(() => {
        if (controlMode !== 'vision') return;
        if (!activePC || !activePC.ws || activePC.ws.readyState !== 1 || sendingFrame) return;
        canvas.width = 640; canvas.height = 480;
        ctx.drawImage(video, 0, 0, 640, 480);
        sendingFrame = true;
        canvas.toBlob(b => {
          sendingFrame = false;
          if (b) b.arrayBuffer().then(buf => activePC.ws.send(buf));
        }, "image/jpeg", 0.7);
      }, 30);
    }

    document.getElementById("saveBtn").onclick = async () => {
      if (!activePC) return;
      let host = activePC.ip;
      if (!host.includes(":") && !host.includes("ngrok") && !host.includes(".dev")) {
        host = host + ":8000";
      }
      const base = location.protocol + "//" + host;
      const payload = {
        shortcuts: {
          one_finger: { enabled: true, target: decodeURIComponent(document.getElementById("s1Select").value) },
          two_fingers: { enabled: true, target: decodeURIComponent(document.getElementById("s2Select").value) },
          three_fingers: { enabled: true, target: decodeURIComponent(document.getElementById("s3Select").value) }
        }
      };
      await fetch(`${base}/api/shortcuts`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
      });
      await fetch(`${base}/api/settings`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sensitivity: parseInt(document.getElementById("sensRange").value) })
      });
      alert("Settings Saved!");
    };

    startLoop();
  </script>
</body>

</html>
